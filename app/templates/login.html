{% extends "base.html" %}
{% block title %}Sign in · Together{% endblock %}
{% block container_class %}max-w-sm mx-auto px-4 py-16{% endblock %}
{% block content %}
  <div class="text-center mb-8">
    <div class="text-2xl font-medium">Together</div>
    <div class="text-sm text-neutral-500 mt-1">Welcome back.</div>
  </div>
  <form method="post" action="/login" class="card space-y-3">
    {% if error %}
      <div class="text-sm text-warning">{{ error }}</div>
    {% endif %}
    <div>
      <label class="text-xs text-neutral-500">Username</label>
      <input class="input mt-1" name="username" autocomplete="username" autofocus required />
    </div>
    <div>
      <label class="text-xs text-neutral-500">Password</label>
      <input class="input mt-1" name="password" type="password" autocomplete="current-password" required />
    </div>
    <button class="btn btn-primary w-full justify-center">Sign in</button>
  </form>
{% endblock %}
